body:
  text: 釋氏源流五宗世譜定祖圖序傳燈録云古佛應世綿歷無窮不可以周知而悉數也故近談賢劫有千如來暨於釋迦但紀七佛案長阿含經云七佛精進力放光滅暗冥各各坐樹下於中成正覺又曼殊室利為七佛祖師金華善慧大土登松山頂行道感七佛引前維摩接後今之撰述斷自七佛而下故遡流於莊嚴劫七佛以來號至釋迦文降靈之後為天竺中華傳法之始祖也住世四十九年後告弟子摩訶迦葉吾以清淨法眼涅槃妙心實相無相微妙正法不立文字教外別傳密付於汝汝當護持併勑阿難副二傳化無令斷絶由是相繼二十八代傳至菩提達磨後達磨復持佛祖一枝正法眼藏併世尊衣鉢航海西來東至嵩山少林寺面壁九年又為東土之始祖也於是繩繩蟄蟄代代不絶二祖有慧可大祖禪師三祖有僧璨鑑智禪師四祖有道信大醫禪師五祖有弘忍大滿禪師六祖有慧能大鑒禪師自六祖下並出兩枝一曰青原行思禪師一曰南嶽懷讓禪師其後列五宗者又以二師為始祖也青原下出石頭希遷禪師遷下復出二枝一曰藥山惟儼禪師一曰天皇道悟禪師儼下出雲巖曇晟禪師晟下出洞山良價禪師價下出曹山本寂禪師由是遂創立曹洞一宗天皇下出龍潭崇信禪師信下出德山宣鑒禪師鑒下出雪峯義存禪師存下復出二枝其一曰玄沙師備禪師一曰雲門文偃禪師由是遂創立雲門一宗備下出羅漢桂琛禪師琛下出清涼文益禪師以示寂後起塔諡大法眼禪師由是遂創立法眼一宗以上三宗俱青原之後也又南嶽下出馬祖道一禪師一下出百丈懷海禪師海下復出二枝一曰溈山靈祐禪師祐下出仰山慧寂禪師由是遂創立溈仰一宗一曰黃蘗希運禪師運下出臨濟義玄禪師由是遂創立臨濟一宗以上二宗俱南嶽之後也爰自六祖下分青原南嶽二大枝二大枝下復分溈仰臨濟曹洞雲門法眼五小枝是為五宗以應一花五葉之讖此乃天倫有序源遠流長之定式也喜遵傳燈録考之則六祖下第五世並有溈仰臨濟第六世方有曹洞第七世始有雲門第九世才有法眼後人錯亂豈可昧却源流古序乎故謹按傳燈録編集釋氏源流五宗世譜定祖圖併五宗法派正枝旁出沿流分派淵源所自一髏相從彚成一帙付梓刊行諸方使後之世代雲仍辨魔揀異捨邪歸正知師資授受之有源衣鉢傳持之有本矣是為序時大清康熙歲次癸未孟夏佛誕日中興陝西西安府華州城東南十五里入終南山猛虎峪太頂二十里許古蟠龍山寺傳臨濟正宗第三十三世子肅超遠和尚法嗣創開建正興陝西西安府華州城西南十五里入終南山赤帝峪又名馬家峪今名敕德峪太頂二十里許天龍山寺傳臨濟正宗第三十四世迅雷明喜禪師同十方緇素人等盥沐焚香稽首撰輯敬刊目録序圖宗派祖圖初祖達磨二祖慧可三祖僧璨四祖道信五祖弘忍六祖慧能六祖下有兩枝一曰青原行思禪師石頭希遷遷下復出二枝一曰藥山惟儼雲巖曇晟洞山良價曹山本寂禪師自此立為曹洞宗又遷下一曰天皇道悟龍潭崇信德山宣鑒雪峰義存存下復出二枝一曰玄沙師備羅漢桂琛清涼文益禪師自此立為法眼宗又存下一曰雲門文偃禪師自此立為雲門宗上三宗乃青原之後也又六祖下一曰南嶽懷讓禪師馬祖道一百丈懷海海下復出二枝一曰溈山靈祐仰山慧寂禪師自此立為溈仰宗又海下一曰黃蘗希運臨濟義玄禪師自此立為臨濟宗上二宗乃南嶽之後也以此遞推遡流則六祖下第五世並有溈仰臨濟第六世方有曹洞第七世始有雲門第九世才有法眼有何差謬溈仰宗仰山慧寂禪師西塔光穆資福如寶報慈德韶興陽詞鐸禪師後嗣無考臨濟宗臨濟義玄禪師興化存獎南院寶應風穴延沼首山省念汾陽善昭石霜楚圓楊岐方會白雲守端五祖法演昭覺克勤虎丘紹隆天童曇華天童咸傑臥龍祖先徑山師範禪師範下並出二枝一曰斷橋倫禪師方山寶無見覩白雲度古拙俊無際悟月溪澄夷峰寧寶芳進野翁曉無趣空無幻沖南明廣其後嗣未録又徑山師範禪師範下一曰雪巖欽禪師高峰原妙中峰明本千巖長萬峰蔚寶藏持東明旵海舟慈寶峰瑄天奇瑞無聞聰笑巖寶幻有傳禪師傳下並出四人一曰雪橋信一曰抱璞蓮二人後嗣未録一曰天隱修修下並出四人即林皋豫玉林秀箬庵問山茨際四人後嗣未録又幻有傳禪師傳下一曰天童密雲圓悟禪師悟下復出一十二人即五峰學漢月藏破山明費隱容石車乘朝宗忍木陳忞石奇雲牧雲門浮石賢以上一十人後嗣未録一曰林野通奇宕山行遠奇然超智文源明燦後嗣未已一曰龍池萬如通微禪師微下餘者未詳一曰浮山文弱行盈禪師盈下餘者未詳一曰中興陝西西安府華州城東南十五里入終南山猛虎峪太頂二十里許古蟠龍山寺傳臨濟正宗第三十三世子肅超遠禪師遠下有一十二人即戒月慧心印璽空谷源耕雲信松林友松雲澄善惟朗際雲闊半庵瑩智林接深雲瑞以上一十一人後嗣不已一曰創開建正興陝西西安府華州城西南十五里入終南山赤帝峪又名馬家峪今名敕德峪太頂二十里許天龍山寺迅雷明喜禪師喜下有一十二人即此峰休空懷心大權任瑞雪雨大勇進永志響永住乾善水海般若果慧空定古崖固以上一十一人後嗣不已一曰偈曰始來蟠龍行無邊創開天龍更勝先蟠龍法孫天龍嗣天龍二代第一禪一曰涌蓮實開禪師開下有一十二人即中株松大豎立萬行修惟修安須彌弘秀山勤慧目定貫周通靈珠光天心順慧靈珍以上一十一人後嗣不已一曰威山際魁禪師勝登了然後嗣不已曹洞宗雲居膺禪師同安丕同安志梁山觀大陽玄投子青芙蓉楷丹霞淳長蘆了天童珏雪竇鑑天童淨鹿門覺青州辨大明寶五山體雪巖滿萬松秀雪庭靈隱泰還源遇淳拙才松庭巖凝然改俱空斌無方從月舟載大章書書下復出二枝一曰廩山忠壽昌經經下復出四人即闃然謐鼓山賢博山來東苑鏡天界盛其後嗣俱未録又書下一曰大千潤潤下復出二人一曰大覺念雲門澄後嗣未録又潤下一曰無言道心悅喜彼岸寬後嗣未録雲門宗雲門文偃禪師香林遠智門祚雪竇顯天衣懷慧林本長蘆信慧林深靈隱光中竺妙光孝深禪師後嗣無考法眼宗清涼文益禪師清涼欽雲居齊瑞巖海翠巖元禪師後嗣無考偽仰派計二十字派曰崇福法德慧普賢行願深文殊廣大智成等正覺果臨濟派計二十字派曰慧正普覺智圓通湛寂清廣演法界性永遠德弘宗至第十三世法鑒禪師嗣法門人福慶號雲巖旁出一枝計三十字派曰福德弘慈廣普賢覺道成利益無邊量宗本永興隆妙悟恆常滿自性證圓融又第十四世界源禪師嗣法門人性金號碧峰又旁出一枝計四十八字派曰智慧清淨道德圓明真如性海寂照普通心源廣續本覺昌隆能仁聖果常演寬弘惟傳法印證悟會融堅持戒定永繼祖宗接此派又新續一枝計四十八字派曰湛然法界方廣嚴宏彌滿本覺了悟心宗惟靈廊徹體用周隆聞思修學止觀常融傳持妙理繼古賢公信解行證月朗天中又碧峰下第二世鵝頭禪師於北京西山建萬壽戒壇橫出臨濟一枝計二十四字派曰清淨道德文成佛法能仁智慧本來自性圓明行理大通無學又碧峰下第四十七世祖定禪師入閩住雪峰山復旁出一枝計二十字派曰祖成戒定慧放光正圓通行超明實際了達悟真空又祖定禪師下第十三世明燦禪師入晉住中條山萬固寺又橫出一枝計二十字派曰明德義幽玄昭然廓性天慧燈聯海焰萬固永流傳又祖定禪師下第十三世創開建正興陝西西安府華州城西南十五里入終南山赤帝峪又名馬家峪今名敕德峪太頂二十里許天龍山寺傳臨濟正宗第三十四世迅雷明喜禪師遵上祖定派下至第二十空字畢後續出一枝計二十字後續枝派曰智種金剛子天龍寶地生法雨心苗勝華開果弘靈曹洞派曹洞下有少林祖庭併江西豫章兩派其豫章派計二十八字派曰清淨覺海圓弘廣悟本真常慧性寬祖道興隆傳法眼普周沙界定心安至第十二世慧經禪師入江西壽昌旁出一枝計二十八字派曰慧圓道大興慈濟悟本傳燈續祖光性海洞明彰法界廣弘行願證真常經下又旁出博山大艤禪師復續一枝計二十字派曰元道弘傳一心光照普通祖師隆法眼永播壽昌宗其少林派計七十字派曰福慧智子覺了本圓可悟周洪普廣宗道慶同玄祖清淨真如海湛寂淳貞素德行永延恆妙體常堅固心朗照幽深性明鑒崇祚衷正善禧祚謹慤願濟度雪庭為導師弘汝皈玄路又第六世旁出蓬鵲山興化寺一枝計二十字派曰了因明祖道覺海永洪宣普度大千界同登般若船又鵲山下至彼岸寬復新出一枝計一百二十字派曰覺海永洪宣授傳宗正脈遐衍善慶福隆自性周遍本來圓通真智妙理清淨澄明實相寂照慈憫利生平等普度方廣權衡教啓賢哲戒行克功學繇悟達法在信能止觀定慧聞思修崇莊嚴品位玄契參同德充果滿佛圖續燈秉持心印師範寰中我願如是世宜斆從彼岸為祖貽訓雲仍嗣先昌後萬代常興又賈菩薩萬安禪師旁出一枝計三十二字派曰廣崇妙普洪勝禧昌繼祖續宗慧鎮維方圓明淨智德行福祥澄清覺海了悟真常又虗照大師旁出一枝計一十六字派曰弘子友可福緣善慶定慧圓明永宗覺性至無極明信禪師復續一枝計一十六字派曰性能廣達妙用無方蘊空實際祖道崇昌又萬松禪師後立一枝計二十字派曰行從慧智立貫徹入環中化統三千界弘開洞上宗至智洪禪師又岔一枝計二十字派曰智信定德寶志善了道行妙淨本明真正法惟思敬又續新派敬謹修持功成福慶緒續新燈圓通自性普度大千權衡曹洞衣鉢傳來萬松祖令又妙相決定禪師復岔一枝計二十八字派曰淨善香然喜敬宗萬光瑞寶顯朗燈世界皓月宣圓照通天了道貫乾坤雲門派計二十字派曰優曇從廣政了性悟真如德智圓通品方知紹祖燈法眼派計二十字派曰祖智悟本真法性常興勝定慧廣圓明覺海玄清印以上五宗五派原宗大綱流行天下也其餘不從正枝正葉接派分宗惟憑各人一時家風興勝隨機自立一枝尚有三十餘家不知自何宗岐至此俱無實考一槩不曾強入後人須明正派切莫涉於別岐欲窮始末根本宜以斯為指南定式云爾
